<!DOCTYPE html>
<html lang="nl">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>StockPulse — Portfolio Tracker met Live Koersen & AI Analyse</title>

          "@type": "Offer",
          "name": "Free",

        {
